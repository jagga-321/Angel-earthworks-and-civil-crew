<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:#0D0D0D;color:#F0EDE8;font-family:'Courier New',monospace;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
input,select,textarea,button{font-family:inherit;font-size:14px;outline:none}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}
select option{background:#1a1a1a;color:#F0EDE8}
.smart-wrap{position:relative}
.smart-drop{position:absolute;top:100%;left:0;right:0;background:#1C1C1C;border:1px solid #333;border-radius:0 0 8px 8px;z-index:50;max-height:200px;overflow-y:auto;display:none;box-shadow:0 8px 24px #0006}
.smart-drop.open{display:block}
.smart-opt{padding:10px 12px;cursor:pointer;font-size:13px;color:#F0EDE8;border-bottom:1px solid #282828;display:flex;justify-content:space-between;align-items:center}
.smart-opt:hover,.smart-opt:active{background:#282828}
.smart-del{color:#6E6B64;font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid #333;background:none;cursor:pointer;font-family:inherit}
.smart-del:active{color:#D93B3B;border-color:#D93B3B}
.shift-row{background:#111;border:1px solid #2A2A2A;border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.shift-row-num{display:inline-block;background:#E8580A;color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;margin-bottom:8px;letter-spacing:1px}
.shift-del-btn{position:absolute;top:10px;right:10px;background:none;border:none;color:#6E6B64;font-size:16px;cursor:pointer;padding:0;line-height:1}

/* Layout */
#boss-header{background:#141414;border-bottom:1px solid #282828;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
#crew-header-bar{background:#141414;border-bottom:1px solid #282828;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
#boss-banner{background:linear-gradient(90deg,#2A1200,#1A0900);border-bottom:1px solid #E8580A30;padding:10px 16px;display:none;justify-content:space-between;align-items:center}
#boss-nav{background:#141414;border-bottom:1px solid #282828;display:flex;overflow-x:auto;padding:0 4px}
#main{padding:14px 14px 80px;max-width:860px;margin:0 auto}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 4px 24px #0008;white-space:nowrap;display:none;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Nav tabs */
.nav-tab{background:none;border:none;color:#6E6B64;padding:11px 12px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.nav-tab.active{color:#E8580A;border-bottom-color:#E8580A}

/* Cards */
.card{background:#1C1C1C;border:1px solid #282828;border-radius:12px;padding:16px 18px;margin-bottom:12px}
.card-click{cursor:pointer}

/* Buttons */
.btn{border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;font-size:13px;padding:10px 18px;letter-spacing:.4px;transition:opacity .15s;white-space:nowrap;border:none}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:#E8580A;color:#fff}
.btn-success{background:#1A6B3C;color:#fff}
.btn-ghost{background:transparent;color:#6E6B64;border:1px solid #282828 !important}
.btn-danger{background:#D93B3B18;color:#D93B3B;border:1px solid #D93B3B35 !important}
.btn-sm{font-size:11px;padding:6px 13px}

/* Form elements */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label,.field-label{font-size:10px;font-weight:700;color:#6E6B64;letter-spacing:1.2px;text-transform:uppercase}
.field input,.field select,.field textarea{background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}

/* Stat tiles */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#1C1C1C;border:1px solid #282828;border-radius:12px;padding:14px 16px;flex:1 1 130px}
.stat-label{font-size:10px;color:#6E6B64;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-size:22px;font-weight:800;line-height:1.1}

/* Badges */
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}

/* Session rows */
.session-item{background:#1C1C1C;border:1px solid #282828;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,background .15s}
.session-item.selected{background:#E8580A12;border-color:#E8580A50}
.session-item.invoiced{cursor:default}

/* Modal */
#overlay{position:fixed;inset:0;background:#000000bb;z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
#overlay.open{display:flex}
.modal{background:#141414;border:1px solid #333;border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-head h3{font-size:16px;font-weight:800;color:#F0EDE8}
.modal-close{background:none;border:none;color:#6E6B64;font-size:24px;cursor:pointer;line-height:1;padding:0 4px}

/* Divider */
.divider{display:flex;align-items:center;gap:10px;margin:8px 0}
.divider span{font-size:10px;color:#6E6B64;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;white-space:nowrap}
.divider-line{flex:1;height:1px;background:#282828}

/* Rate table */
.rate-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #282828}
.rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}

/* Market bar */
.mbar{margin-bottom:4px}
.mbar-track{position:relative;height:6px;background:#282828;border-radius:3px;margin:5px 0}
.mbar-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px}
.mbar-labels{display:flex;justify-content:space-between;font-size:10px;color:#6E6B64}

/* Invoice list */
.inv-status-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

/* Timer */
#timer-display{font-variant-numeric:tabular-nums;color:#E8580A;font-weight:800;font-size:16px}
.blink{animation:blink 1.4s infinite}

/* Section header */
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:13px;font-weight:800;color:#F0EDE8}

/* Empty state */
.empty{text-align:center;padding:36px 20px;color:#6E6B64}
.empty .empty-icon{font-size:30px;margin-bottom:10px}

/* After hours check */
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#C8C4BE;margin-bottom:8px}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#F5C518}

/* Invoice view */
.inv-header{background:linear-gradient(135deg,#E8580A,#FF7A2F);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.line-items{border:1px solid #282828;border-radius:10px;overflow:hidden;margin-bottom:14px}
.line-item-head{background:#141414;padding:8px 14px;display:flex;justify-content:space-between;font-size:10px;color:#6E6B64;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.line-item-row{padding:10px 14px;border-bottom:1px solid #282828;display:flex;justify-content:space-between;gap:10px}
.totals-box{background:#0D0D0D;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.pay-box{background:#141414;border-radius:10px;padding:12px 14px;font-size:12px;margin-bottom:14px}
.session-list-inv{max-height:220px;overflow-y:auto;border:1px solid #282828;border-radius:8px;background:#0D0D0D}
.sess-inv-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;cursor:pointer;border-bottom:1px solid #282828;transition:background .1s}
.sess-inv-row.sel{background:#E8580A18}
.totals-preview{background:#0D0D0D;border-radius:8px;padding:12px 14px;margin-bottom:12px}

/* ── PIN SCREEN (merged app) ─────────────────────────────── */
#pin-screen{position:fixed;inset:0;background:#0D0D0D;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.pin-dots{display:flex;justify-content:center;margin:20px 0}
.dot{width:14px;height:14px;border-radius:50%;background:#282828;margin:0 8px;transition:background .15s}
.dot.on{background:#22A05A}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;width:100%;margin-top:8px}
.pin-btn{background:#1C1C1C;border:1px solid #282828;border-radius:12px;color:#F0EDE8;font-size:22px;font-weight:700;padding:16px;cursor:pointer}
.pin-btn:active{background:#2A2A2A}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.pin-shake{animation:shake .3s}

/* ── CREW CLOCK TAB ───────────────────────────────────────── */
.lb{background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;font-size:12px;font-weight:700;padding:10px 4px;cursor:pointer;font-family:inherit;text-align:center}
.lb.on{background:#1A6B3C;border-color:#22A05A;color:#fff}
.crew-stat{background:#1C1C1C;border:1px solid #282828;border-radius:12px;padding:14px 16px;flex:1 1 100px;text-align:center}
.crew-stat-label{font-size:10px;color:#6E6B64;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.crew-stat-value{font-size:20px;font-weight:800}
.crew-nav-tab{background:none;border:none;color:#6E6B64;padding:11px 14px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap}
.crew-nav-tab.on{color:#22A05A;border-bottom-color:#22A05A}

</style>

<script>

// ════════════════════════════════════════════════════════
// DATA & DEFAULTS
// ════════════════════════════════════════════════════════
var DR = {
  excavatorWet:125, excavatorWetTilt:140, excavatorWetRock:155,
  excavatorWetAuger:145, excavatorWetTrenching:130, excavatorWetCleanup:125,
  excavatorDry:70, truckWet:130, truckWetRegional:150, truckDry:80,
  excavatorSubWet:115, excavatorSubDry:65, truckSubWet:120,
  minHours:4, mobilisationLocal:200, mobilisationRegional:350, afterHoursSurcharge:25
};
var DS = {
  businessName:"Angel Earthworks and Civil", abn:"",
  address:"Victor Harbor / Goolwa SA 5211", phone:"", email:"",
  accountName:"", bsb:"", account:"", nextInvoice:1,
  rates:{...DR}
};

// Safe element value getter
function gv(id){var el=document.getElementById(id);return el?el.value:"";}
function gvt(id){var el=document.getElementById(id);return el?(el.value||"").trim():"";}

// ── Storage: localStorage (fast) + Firebase (sync across phones) ──
function load(k,def){
  try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):def;}catch(e){return def;}
}
function save(k,v){
  // Save locally first (instant)
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
  // Then sync to Firebase (all phones get update)
  try{
    if(typeof db!=="undefined"){
      db.collection("ae_data").doc(k).set({d:JSON.stringify(v),t:Date.now()})
        .catch(function(e){console.log("FB save fail:",e);});
    }
  }catch(e){console.log("FB save error:",e);}
}

// Sync latest data from Firebase into this phone
function syncFromFirebase(cb){
  if(typeof db==="undefined"){if(cb)cb();return;}
  var keys=["ae_sessions","ae_crew","ae_invoices","ae_settings","ae_pins"];
  var done=0;
  keys.forEach(function(k){
    db.collection("ae_data").doc(k).get()
      .then(function(doc){
        if(doc.exists){
          var val=JSON.parse(doc.data().d);
          try{localStorage.setItem(k,JSON.stringify(val));}catch(e){}
        }
        done++;
        if(done===keys.length&&cb)cb();
      })
      .catch(function(){done++;if(done===keys.length&&cb)cb();});
  });
}

// Real-time listener — updates this phone when another phone saves data
function startFirebaseListeners(){
  if(typeof db==="undefined") return;
  var keys=["ae_sessions","ae_crew","ae_invoices","ae_settings","ae_pins"];
  keys.forEach(function(k){
    db.collection("ae_data").doc(k).onSnapshot(function(doc){
      if(!doc.exists) return;
      try{
        var val=JSON.parse(doc.data().d);
        try{localStorage.setItem(k,JSON.stringify(val));}catch(e){}
        // Update live app state
        if(k==="ae_sessions"){
          sessions=val;
          sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});
        }
        if(k==="ae_crew") crew=val;
        if(k==="ae_invoices") invoices=val;
        if(k==="ae_settings") settings=Object.assign({},DS,val);
        if(k==="ae_pins") crewMembers=val;
        // Refresh screen if logged in
        if(currentUser&&currentUser.role==="manager"){try{render();}catch(e){}}
        if(currentUser&&currentUser.role==="crew"){try{crewDrawTab();}catch(e){}}
      }catch(e){console.log("FB listener parse error:",e);}
    },function(e){console.log("FB listener error:",e);});
  });
}

// ── Fresh start: wipe all old data from previous app versions ──
try{
  var APP_VER="firebase_v5";
  if(localStorage.getItem("ae_app_ver")!==APP_VER){
    var keys=["ae_sessions","ae_crew","ae_invoices","ae_settings","ae_active",
              "ae_history","ae_pins","ae_ents","ae_clocked","ae_hist","ae_mgr"];
    keys.forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});

function lookupRate(machine,hireType,attachment){
  const r=settings.rates;
  if(hireType==="Own Work") return 0;
  if(machine==="Hino 700") return hireType==="Dry Hire"?r.truckDry:r.truckWet;
  if(hireType==="Dry Hire") return r.excavatorDry;
  const att=attachment||"General Bucket";
  if(att==="Rock Breaker")    return r.excavatorWetRock;
  if(att==="Auger")           return r.excavatorWetAuger;
  if(att==="Tilt Bucket")     return r.excavatorWetTilt;
  if(att==="Trenching Bucket")return r.excavatorWetTrenching;
  if(att==="Clean-up Bucket") return r.excavatorWetCleanup;
  return r.excavatorWet;
}

// ── Smart Input History ────────────────────────────────
var history=load("ae_history",{clients:[],sites:[],notes:[]});
function addHistory(type,val){
  if(!val||!val.trim())return;val=val.trim();
  if(!history[type])history[type]=[];
  history[type]=history[type].filter(v=>v!==val);
  history[type].unshift(val);
  if(history[type].length>20)history[type]=history[type].slice(0,20);
  save("ae_history",history);
}
function removeHistory(type,val){history[type]=(history[type]||[]).filter(v=>v!==val);save("ae_history",history);}
function smartInput(id,type,placeholder,value){
  value=value||"";
  const opts=(history[type]||[]).map(v=>`<div class="smart-opt" onclick="pickSmart('${id}','${esc(v)}')">`+
    `<span>${esc(v)}</span><button class="smart-del" onclick="event.stopPropagation();delSmart('${id}','${type}','${esc(v)}')">✕</button></div>`).join("");
  return `<div class="smart-wrap"><input id="${id}" value="${esc(value)}" placeholder="${esc(placeholder)}"
    style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"
    autocomplete="off" oninput="filterSmart('${id}','${type}',this.value)"
    onfocus="openSmartDrop('${id}')" onblur="setTimeout(()=>closeSmartDrop('${id}'),200)"/>
    <div class="smart-drop" id="${id}-drop">${opts}</div></div>`;
}
function openSmartDrop(id){const d=document.getElementById(id+"-drop");if(d&&d.children.length>0)d.classList.add("open");}
function closeSmartDrop(id){const d=document.getElementById(id+"-drop");if(d)d.classList.remove("open");}
function pickSmart(id,val){const el=document.getElementById(id);if(el){el.value=val;closeSmartDrop(id);}}
function filterSmart(id,type,q){
  const d=document.getElementById(id+"-drop");if(!d)return;
  const list=(history[type]||[]).filter(v=>v.toLowerCase().includes(q.toLowerCase()));
  if(!list.length){d.classList.remove("open");return;}
  d.innerHTML=list.map(v=>`<div class="smart-opt" onclick="pickSmart('${id}','${esc(v)}')">`+
    `<span>${esc(v)}</span><button class="smart-del" onclick="event.stopPropagation();delSmart('${id}','${type}','${esc(v)}')">✕</button></div>`).join("");
  d.classList.add("open");
}
function delSmart(id,type,val){removeHistory(type,val);filterSmart(id,type,(document.getElementById(id)||{}).value||"");}

function toast(msg,type="success"){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.background=type==="error"?"#D93B3B":"#1A6B3C";
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2800);
}

// ── Timer ──────────────────────────────────────────────
function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!activeSession){clearInterval(timerInterval);return;}
    const el=Math.floor((Date.now()-new Date(activeSession.startTime).getTime())/1000);
    const h=Math.floor(el/3600),m=Math.floor((el%3600)/60),s=el%60;
    const td=document.getElementById("timer-display");
    if(td) td.textContent=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  },1000);
}

function updateBanner(){

}

function selLunch(m){
  window._lunchMins=m;
  [0,15,20,30,45,60].forEach(x=>{
    const b=document.getElementById("lb"+x);
    if(b) b.style.cssText="padding:10px 6px;font-size:12px;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;width:100%;border:1px solid "
      +(x===m?"#E8580A;background:#E8580A;color:#fff":"#282828;background:transparent;color:#6E6B64");
  });updLunch(m);
}
function selLunchCustom(val){
  window._lunchMins=val||0;
  [0,15,20,30,45,60].forEach(x=>{const b=document.getElementById("lb"+x);if(b)b.style.cssText="padding:10px 6px;font-size:12px;border-radius:8px;font-family:inherit;font-weight:700;cursor:pointer;width:100%;border:1px solid #282828;background:transparent;color:#6E6B64";});
  updLunch(val||0);
}
function updLunch(mins){
  const raw=window._lunchRaw||0,rate=window._lunchRate||0,bill=Math.max(0,raw-(mins/60));
  const dr=document.getElementById("ldr"),dv=document.getElementById("ldv"),bh=document.getElementById("lbh"),lt=document.getElementById("ltot");
  if(dr)dr.style.display=mins>0?"flex":"none";if(dv)dv.textContent="− "+mins+"min";
  if(bh)bh.textContent=fmtHrs(bill);if(lt)lt.textContent=fmtCur(bill*rate);
}
function finishSession(){
  const s=window._lunchSession,e=window._lunchEnd,r=window._lunchRaw,l=window._lunchMins||0;
  if(!s||!e)return;
  const dur=Math.max(0,r-(l/60)),tot=Math.round(dur*s.rate*100)/100;
  sessions.unshift({...s,endTime:e,duration:dur,total:tot,lunchBreak:l,rawDuration:r,status:"complete"});
  sessions.sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
  activeSession=null;saveAll();updateBanner();closeModal();
  toast("Session saved — "+fmtHrs(dur)+(l>0?" (excl. "+l+"min lunch)":"")+" · "+fmtCur(tot));render();
}

function saveManualSession(){
  const client=document.getElementById("mf-client").value.trim();
  const date=document.getElementById("mf-date").value;
  const startT=document.getElementById("mf-start").value;
  const endT=document.getElementById("mf-end").value;
  if(!client){toast("Please enter a client name","error");return;}
  if(!date){toast("Please enter a date","error");return;}
  if(!startT||!endT){toast("Please enter start and end times","error");return;}
  const startISO=new Date(date+"T"+startT).toISOString();
  const endISO=new Date(date+"T"+endT).toISOString();
  if(new Date(endISO)<=new Date(startISO)){toast("End time must be after start time","error");return;}
  const rawDuration=(new Date(endISO)-new Date(startISO))/3600000;
  const lunchMins=parseInt(gv("mf-lunch"))||0;
  const duration=Math.max(0,rawDuration-(lunchMins/60));
  const machine=document.getElementById("mf-machine").value;
  const attachment=gv("mf-attachment")||"General Bucket";
  const hireType=document.getElementById("mf-hiretype").value;
  const operator=document.getElementById("mf-operator").value;

function saveEditSession(){
  const id=window._editId;if(!id)return;
  const s=sessions.find(x=>x.id===id);
  if(!s||s.invoiced){toast("Cannot edit an invoiced session","error");return;}
  const client=document.getElementById("ed-client").value.trim();
  const site=document.getElementById("ed-site").value.trim();
  const date=document.getElementById("ed-date").value;
  const startT=document.getElementById("ed-start").value;
  const endT=document.getElementById("ed-end").value;
  const machine=document.getElementById("ed-machine").value;
  const attachment=machine==="Hino 700"?"None":(gv("ed-attachment")||"General Bucket");
  const hireType=document.getElementById("ed-hiretype").value;
  const operator=document.getElementById("ed-operator").value;
  const rate=parseFloat(document.getElementById("ed-rate").value)||0;
  const lunch=parseInt(document.getElementById("ed-lunch").value)||0;
  const notes=document.getElementById("ed-notes").value.trim();
  if(!client){toast("Please enter a client name","error");return;}
  if(!date||!startT||!endT){toast("Please enter date and times","error");return;}
  const startISO=new Date(date+"T"+startT).toISOString();
  const endISO=new Date(date+"T"+endT).toISOString();
  if(new Date(endISO)<=new Date(startISO)){toast("End must be after start","error");return;}
  const rawDuration=(new Date(endISO)-new Date(startISO))/3600000;
  const duration=Math.max(0,rawDuration-(lunch/60));
  const total=Math.round(duration*rate*100)/100;
  addHistory("clients",client);addHistory("sites",site);addHistory("notes",notes);
  sessions=sessions.map(x=>x.id===id?{...x,client,site,machine,attachment,hireType,operator,rate,notes,
    startTime:startISO,endTime:endISO,rawDuration,duration,lunchBreak:lunch,total}:x);
  saveAll();closeModal();toast("Session updated ✅");render();
}

    startTime:firstRow.startTime||"",endTime:firstRow.endTime||"",lunch:0});
  renderShiftModal();restoreShiftFields();
}
function removeShiftRow(i){
  saveShiftFields();window._shiftRows.splice(i,1);renderShiftModal();restoreShiftFields();
}
function saveShiftSheet(){
  const client=document.getElementById("ss-client").value.trim();
  const site=document.getElementById("ss-site").value.trim();
  const date=document.getElementById("ss-date").value;
  const notes=document.getElementById("ss-notes").value.trim();
  if(!client){toast("Please enter a client name","error");return;}
  if(!date){toast("Please enter a date","error");return;}
  // Validate each row has times
  for(let i=0;i<window._shiftRows.length;i++){
    const row=window._shiftRows[i];
    const st=(document.getElementById("shift-start-"+i)||{}).value||row.startTime||"";
    const et=(document.getElementById("shift-end-"+i)||{}).value||row.endTime||"";
    if(!st||!et){toast("Please enter start and end time for Resource "+(i+1),"error");return;}
    const sISO=new Date(date+"T"+st),eISO=new Date(date+"T"+et);
    if(eISO<=sISO){toast("End must be after start for Resource "+(i+1),"error");return;}
  }
  addHistory("clients",client);addHistory("sites",site);addHistory("notes",notes);
  const newSessions=window._shiftRows.map((row,i)=>{
    const rate=parseFloat((document.getElementById("shift-rate-"+i)||{}).value)||row.rate||0;
    const operator=(document.getElementById("shift-op-"+i)||{}).value||row.operator||"";
    const st=(document.getElementById("shift-start-"+i)||{}).value||row.startTime||"";
    const et=(document.getElementById("shift-end-"+i)||{}).value||row.endTime||"";
    const lunch=row.lunch||0;
    const startISO=new Date(date+"T"+st).toISOString();
    const endISO=new Date(date+"T"+et).toISOString();
    const rawDuration=(new Date(endISO)-new Date(startISO))/3600000;
    const duration=Math.max(0,rawDuration-(lunch/60));
    const total=Math.round(duration*rate*100)/100;
    return {id:uid(),client,site,machine:row.machine,
      attachment:row.machine==="Hino 700"?"":row.attachment,
      hireType:row.hireType,operator,rate,notes,
      startTime:startISO,endTime:endISO,duration,lunchBreak:lunch,rawDuration,total,
      status:"complete",invoiced:false,shiftGroup:date+"_"+client};
  });
  sessions.unshift(...newSessions);
  sessions.sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
  saveAll();closeModal();
  toast("Shift saved — "+newSessions.length+" resource"+(newSessions.length>1?"s":"")+" ✅");render();
}

function toggleSelectSession(id){
  const s=sessions.find(x=>x.id===id);
  if(s&&s.invoiced) return;
  if(selectedSess.includes(id)) selectedSess=selectedSess.filter(x=>x!==id);
  else selectedSess.push(id);
  render();
}

function addCrew(){
  const name=document.getElementById("cf-name").value.trim();
  if(!name){toast("Please enter a name","error");return;}
  if(crew.some(c=>c.name.toLowerCase()===name.toLowerCase())){toast("Already exists","error");return;}
  const role=document.getElementById("cf-role").value.trim()||"Operator";
  const rate=parseFloat(document.getElementById("cf-rate").value)||35;
  crew.push({id:uid(),name,role,rate});
  saveAll(); closeModal(); toast("Crew member added"); render();
}

function deleteCrew(id){
  if(!confirm("Remove this crew member?")) return;
  crew=crew.filter(c=>c.id!==id);
  saveAll(); render(); toast("Crew member removed");
}

function buildInvoice(){
  const client=document.getElementById("if-client").value.trim();
  if(!client){toast("Please enter a client name","error");return;}
  if(!selectedSess.length){toast("Select at least one session","error");return;}
  const items=sessions.filter(s=>selectedSess.includes(s.id));
  const subtotal=Math.round(items.reduce((a,s)=>a+s.total,0)*100)/100;
  const gst=Math.round(subtotal*.1*100)/100;
  const totalGST=Math.round((subtotal+gst)*100)/100;
  const invNo=fmtInvNo(settings.nextInvoice);
  const dueInput=document.getElementById("if-due").value;
  const dueDate=dueInput?new Date(dueInput+"T00:00:00").toISOString():new Date(Date.now()+14*86400000).toISOString();
  const inv={id:uid(),invoiceNo:invNo,date:new Date().toISOString(),dueDate,
    client,clientAddress:document.getElementById("if-addr").value.trim(),
    notes:document.getElementById("if-notes").value,
    items,subtotal,gst,totalGST,status:"Draft"};
  invoices.unshift(inv);
  settings.nextInvoice++;
  sessions=sessions.map(s=>selectedSess.includes(s.id)?{...s,invoiced:true,invoiceNo:invNo}:s);
  selectedSess=[];
  saveAll(); closeModal(); switchTab("invoices"); toast("Invoice "+invNo+" created"); render();
}

function setInvoiceStatus(id,status){
  invoices=invoices.map(i=>i.id===id?{...i,status,paidDate:status==="Paid"?new Date().toISOString():i.paidDate}:i);
  saveAll(); render();
}

function deleteInvoice(id){
  if(!confirm("Delete this invoice? Sessions will be restored to uninvoiced.")) return;
  const inv=invoices.find(i=>i.id===id);
  invoices=invoices.filter(i=>i.id!==id);
  if(inv) sessions=sessions.map(s=>s.invoiceNo===inv.invoiceNo?{...s,invoiced:false,invoiceNo:undefined}:s);
  saveAll(); render(); toast("Invoice deleted");
}

function saveSetting(key,val){settings[key]=val;saveAll();document.getElementById("biz-name").textContent=settings.businessName;}
function updateRate(key,val){settings.rates[key]=parseFloat(val)||0;saveAll();}

function sfUpdateRate(){
  const machine=gv("sf-machine");
  const hireType=gv("sf-hiretype");
  const attachment=gv("sf-attachment");
  const attWrap=document.getElementById("sf-att-wrap");
  const rateWrap=document.getElementById("sf-rate-wrap");
  const ownMsg=document.getElementById("sf-ownwork-msg");
  const ahWrap=document.getElementById("sf-ah-wrap");
  if(attWrap) attWrap.style.display=machine==="Hino 700"?"none":"flex";
  if(rateWrap) rateWrap.style.display=hireType==="Own Work"?"none":"flex";
  if(ownMsg) ownMsg.style.display=hireType==="Own Work"?"block":"none";
  if(ahWrap) ahWrap.style.display=hireType==="Own Work"?"none":"flex";
  const rateEl=document.getElementById("sf-rate");
  if(rateEl&&hireType!=="Own Work"){
    const ah=(document.getElementById("sf-afterhours")||document.createElement("input")).checked?settings.rates.afterHoursSurcharge:0;
    rateEl.value=lookupRate(machine,hireType,attachment)+ah;
  }
}

function toggleInvSess(id){
  const s=sessions.find(x=>x.id===id);
  if(s&&s.invoiced) return;
  if(selectedSess.includes(id)) selectedSess=selectedSess.filter(x=>x!==id);
  else selectedSess.push(id);
  openModal("invoice"); // re-render modal with updated selection
}
function selectAllInv(all){
  const uninv=sessions.filter(s=>!s.invoiced);
  selectedSess=all?uninv.map(s=>s.id):[];
  openModal("invoice");
}

function closeModal(){document.getElementById("overlay").classList.remove("open");}
function handleOverlayClick(e){if(e.target===document.getElementById("overlay"))closeModal();}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

// ════════════════════════════════════════════════════════
// TAB NAVIGATION
// ════════════════════════════════════════════════════════
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".nav-tab").forEach(b=>{
    b.classList.toggle("active",b.dataset.tab===tab);
  });
  render();
}

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
function render(){
  const main=document.getElementById("main");
  if(!main) return;
  try{
    if(currentTab==="dashboard") main.innerHTML=renderDashboard();
    else if(currentTab==="sessions") main.innerHTML=renderSessions();
    else if(currentTab==="crew") main.innerHTML=renderCrew();
    else if(currentTab==="invoices") main.innerHTML=renderInvoices();
    else if(currentTab==="rates") main.innerHTML=renderRates();
  }catch(err){
    console.error("Render error:",err);
    main.innerHTML='<div class="card" style="margin-top:20px"><div style="text-align:center;padding:24px;color:#D93B3B"><div style="font-size:24px;margin-bottom:10px">⚠️</div><div style="font-weight:700;margin-bottom:8px">Screen load error</div><div style="font-size:12px;color:#6E6B64">Try switching to another tab and back.<br>Your data is safe.</div></div></div>';
  }
}

function renderDashboard(){
  const totalHrs=sessions.reduce((a,s)=>a+(s.duration||0),0);
  const totalRev=sessions.reduce((a,s)=>a+(s.total||0),0);
  const weekAgo=new Date(Date.now()-7*86400000);
  const weekSess=sessions.filter(s=>new Date(s.startTime)>=weekAgo);
  const weekHrs=weekSess.reduce((a,s)=>a+(s.duration||0),0);
  const outstanding=invoices.filter(i=>i.status!=="Paid").reduce((a,i)=>a+(i.totalGST||0),0);
  const uninvCount=sessions.filter(s=>!s.invoiced).length;

  const recentRows=[...sessions].sort((a,b)=>new Date(b.startTime)-new Date(a.startTime)).slice(0,5).map(s=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #282828">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:#F0EDE8;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${esc(s.machine)} ${badge(s.hireType,HIRE_COL[s.hireType]||"#6E6B64",true)}
          ${s.invoiced?badge("Invoiced","#22A05A",true):""}
        </div>
        <div style="font-size:11px;color:#6E6B64;margin-top:2px">${fmtDate(s.startTime)} · ${esc(s.client||"No client")}${s.site?" · "+esc(s.site):""}</div>
      </div>
      <div style="text-align:right;margin-left:10px;flex-shrink:0">
        <div style="font-size:14px;font-weight:800;color:#22A05A">${fmtCur(s.total)}</div>
        <div style="font-size:10px;color:#6E6B64">${fmtHrs(s.duration)}</div>
      </div>
    </div>`).join("")||`<div class="empty"><div class="empty-icon">⏱</div><div>No sessions yet</div></div>`;

  const machineRows=["Hitachi ZX55U","Hino 700","Both"].filter(m=>sessions.some(s=>s.machine===m)).map(m=>{
    const ms=sessions.filter(s=>s.machine===m);
    const mHrs=ms.reduce((a,s)=>a+(s.duration||0),0);
    const mRev=ms.reduce((a,s)=>a+(s.total||0),0);
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #282828">
      <div>
        <div style="font-size:13px;font-weight:700;color:#F0EDE8">${m}</div>
        <div style="font-size:11px;color:#6E6B64">${ms.length} session${ms.length!==1?"s":""}</div>
      </div>
      <div style="display:flex;gap:18px;text-align:right">
        <div><div style="font-size:13px;color:#E8580A">${fmtHrs(mHrs)}</div><div style="font-size:10px;color:#6E6B64">Hours</div></div>
        <div><div style="font-size:13px;color:#22A05A">${fmtRev(mRev)}</div><div style="font-size:10px;color:#6E6B64">Revenue</div></div>
      </div>
    </div>`;
  }).join("")||`<div style="color:#6E6B64;font-size:13px;padding:10px 0">No data yet</div>`;

  return `
    <div class="stats-row">
      <div class="stat"><div class="stat-label">All-time Hours</div><div class="stat-value" style="color:#E8580A">${fmtHrs(totalHrs)}</div><div style="font-size:11px;color:#6E6B64;margin-top:5px">${sessions.length} sessions</div></div>
      <div class="stat"><div class="stat-label">This Week</div><div class="stat-value" style="color:#F5C518">${fmtHrs(weekHrs)}</div><div style="font-size:11px;color:#6E6B64;margin-top:5px">${weekSess.length} sessions</div></div>
      <div class="stat"><div class="stat-label">Total Revenue</div><div class="stat-value" style="color:#22A05A">${fmtCur(totalRev)}</div><div style="font-size:11px;color:#6E6B64;margin-top:5px">Ex GST</div></div>
      <div class="stat"><div class="stat-label">Outstanding</div><div class="stat-value" style="color:${outstanding>0?"#D93B3B":"#6E6B64"}">${fmtCur(outstanding)}</div><div style="font-size:11px;color:#6E6B64;margin-top:5px">${invoices.filter(i=>i.status!=="Paid").length} inv.</div></div>
    </div>

    <div class="card">
      <div style="font-size:11px;font-weight:700;color:#6E6B64;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px">Quick Actions</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${activeSession
          ?`<button class="btn btn-danger" onclick="stopSession()">⏹ Stop Session</button>`
          :`<button class="btn btn-primary" onclick="openModal('session')">▶ Start Live Session</button>`}
        <button class="btn btn-ghost" onclick="openModal('manual')">✎ Manual Session</button>
        <button class="btn btn-ghost" onclick="openShiftSheet()" style="color:#F5C518;border-color:#F5C51840 !important">📋 Shift Sheet</button>
        <button class="btn btn-success" onclick="openInvoiceModal()">🧾 Build Invoice</button>
      </div>
      ${uninvCount>0?`<div style="font-size:11px;color:#E8580A;margin-top:10px">⚡ ${uninvCount} session${uninvCount!==1?"s":""} ready to invoice</div>`:""}
    </div>

    <div class="card">
      <div class="sec-head"><div class="sec-title">Recent Sessions</div><button class="btn btn-ghost btn-sm" onclick="switchTab('sessions')">View All</button></div>
      ${recentRows}
    </div>

    <div class="card">
      <div class="sec-title" style="margin-bottom:12px">Machine Summary</div>
      ${machineRows}
    </div>`;
}

function fmtRev(n){return fmtCur(n);}

  const sorted=[...sessions].sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));

  const rows=sorted.map(s=>{
    const sel=selectedSess.includes(s.id);
    return `<div class="session-item${sel?" selected":""}${s.invoiced?" invoiced":""}" onclick="toggleSelectSession('${s.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">

          ${s.notes?`<div style="font-size:11px;color:#6E6B64;margin-top:3px;font-style:italic">${esc(s.notes)}</div>`:""}

        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:16px;font-weight:800;color:#22A05A">${fmtCur(s.total)}</div>

function renderCrew(){

  const crewCards=crew.map(m=>{
    const ms=sessions.filter(s=>s.operator===m.name);
    const mHrs=ms.reduce((a,s)=>a+(s.duration||0),0);
    const wHrs=ms.filter(s=>new Date(s.startTime)>=weekAgo).reduce((a,s)=>a+(s.duration||0),0);
    const last3=ms.slice(0,3).map(s=>`
      <div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;color:#6E6B64">
        <span>${fmtDate(s.startTime)} · ${esc(s.machine)}${s.client?" · "+esc(s.client):""}</span>
        <span style="color:#C8C4BE;margin-left:8px">${fmtHrs(s.duration)}</span>

    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:15px;font-weight:800;color:#F0EDE8">${esc(m.name)}</div>
          <div style="font-size:11px;color:#6E6B64;margin-top:2px">${esc(m.role)} · $${m.rate}/hr</div>

      </div>

  const hasPay=crew.length>0&&sessions.some(s=>crew.some(c=>c.name===s.operator));

  const mktRows=markets.map(m=>{

      <div class="mbar-labels"><span>$${m.low}</span><span style="color:${col};font-weight:700">Your rate: $${m.your}/hr</span><span>$${m.high}</span></div>

      </div>
      <div style="font-size:10px;color:#E8580A;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px">WET HIRE</div>
      ${rateRow("General Bucket",r.excavatorWet)}
      ${rateRow("Tilt Hitch",r.excavatorWetTilt,"#F5C518","Premium attachment")}
      ${rateRow("Rock Breaker",r.excavatorWetRock,"#F5C518","Premium + wear")}
      ${rateRow("Auger",r.excavatorWetAuger,"#F5C518","Premium attachment")}
      ${rateRow("Trenching Bucket",r.excavatorWetTrenching)}
      ${rateRow("Clean-up Bucket",r.excavatorWetCleanup)}
      <div style="font-size:10px;color:#2878CC;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-top:12px;margin-bottom:2px">DRY HIRE</div>
      ${rateRow("Machine only — no operator",r.excavatorDry,"#2878CC","Client must hold High Risk Work Licence")}
    </div>

    <div class="card" style="border-color:#2878CC40;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:800;color:#F0EDE8">🚛 Hino 700</div>
          <div style="font-size:11px;color:#6E6B64">2007 · Tipper · Experienced Driver</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openModal('settings')">Edit</button>
      </div>
      <div style="font-size:10px;color:#E8580A;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px">WET HIRE</div>
      ${rateRow("Local — Fleurieu Peninsula",r.truckWet,"#22A05A","Within ~30 min of Victor Harbor")}

      ${rateRow("Truck only — no driver",r.truckDry,"#2878CC","Client must hold HR licence — get written agreement")}

    <div class="card" style="margin-bottom:12px">
      <div style="font-size:13px;font-weight:800;color:#F0EDE8;margin-bottom:12px">Extras & Minimums</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">

function exportData(){
  const data={sessions,crew,invoices,settings,exportedAt:new Date().toISOString(),version:"1.0"};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="AngelEarthworks_Backup_"+new Date().toISOString().split("T")[0]+".json";
  a.click();
  URL.revokeObjectURL(url);
  toast("Data exported — save the file safely");
}

function openAddCrewPinModal(){

function doAddCrewPin(){
  const name=(gvt("acm-name")||"");
  const role=(gvt("acm-role")||"Operator");
  const pin=gvt("acm-pin");
  if(!name){toast("Please enter a name","error");return;}
  if(pin.length!==4||isNaN(Number(pin))){toast("PIN must be exactly 4 digits","error");return;}
  if((settings.managerPin||"0000")===pin){toast("Cannot use the manager PIN","error");return;}
  if(crewMembers.find(m=>m.pin===pin)){toast("PIN already in use","error");return;}
  crewMembers.push({id:uid(),name,role,pin});
  save("ae_pins",crewMembers);
  if(!crew.find(c=>c.name===name)){crew.push({id:uid(),name,role,rate:35});saveAll();}
  closeModal();render();toast(name+" added ✅");
}
function openEditPinModal(id){
  const m=crewMembers.find(x=>x.id===id);if(!m)return;
  openModal("✏️ Edit — "+m.name);
  document.getElementById("modal-body").innerHTML=`
    <div class="field"><label>Name</label><input id="epm-name" value="${esc(m.name)}"/></div>
    <div class="field"><label>Role</label><input id="epm-role" value="${esc(m.role||"Operator")}"/></div>
    <div class="field"><label>PIN (4 digits)</label><input id="epm-pin" type="tel" maxlength="4" value="${esc(m.pin)}"/></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" style="flex:1" onclick="doEditCrewPin('${id}')">Save</button>
      <button class="btn btn-danger btn-sm" onclick="doRemoveCrewMember('${id}')">Remove</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`;
}
function doEditCrewPin(id){
  const name=(gvt("epm-name")||"");
  const role=(gvt("epm-role")||"Operator");
  const pin=gvt("epm-pin")
  if(!name){toast("Please enter a name","error");return;}
  if(pin.length!==4||isNaN(Number(pin))){toast("PIN must be 4 digits","error");return;}
  if((settings.managerPin||"0000")===pin){toast("Cannot use the manager PIN","error");return;}
  if(crewMembers.find(m=>m.pin===pin&&m.id!==id)){toast("PIN already in use","error");return;}
  crewMembers=crewMembers.map(m=>m.id===id?{...m,name,role,pin}:m);
  crew=crew.map(c=>{const cm=crewMembers.find(x=>x.id===id);return cm&&c.name===cm.name?{...c,name,role}:c;});
  save("ae_pins",crewMembers);saveAll();closeModal();render();toast("Updated ✅");
}
function doRemoveCrewMember(id){
  const m=crewMembers.find(x=>x.id===id);
  if(!m||!confirm("Remove "+m.name+"? Their logged hours are kept."))return;
  crewMembers=crewMembers.filter(x=>x.id!==id);
  save("ae_pins",crewMembers);closeModal();render();toast(m.name+" removed");
}

function doChangeMgrPin(){
  const p1=gvt("cmp-new")

  if(p1.length!==4||isNaN(Number(p1))){toast("Must be 4 digits","error");return;}

function renderMachineHoursManager(){
  var entries=load("ae_mhours",[]);
  if(!entries.length) return "";
  entries.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});

  // Group by machine, show latest entry per machine
  var byMachine={};
  entries.forEach(function(e){
    if(!byMachine[e.machine]) byMachine[e.machine]=[];
    byMachine[e.machine].push(e);
  });

  var html='<div class="card" style="border-color:#E8580A40;margin-bottom:8px">';
  html+='<div style="font-size:13px;font-weight:800;color:#F0EDE8;margin-bottom:12px">🔧 Machine Hours Log</div>';

  Object.keys(byMachine).forEach(function(machine){
    var mEntries=byMachine[machine];
    var latest=mEntries[0];
    var typeColors={"Service Done":"#22A05A","Service Due":"#F5C518","Fault Noted":"#D93B3B","Hours Logged":"#E8580A","Other":"#6E6B64"};

    html+='<div style="margin-bottom:12px">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html+='<div style="font-size:12px;font-weight:800;color:#F0EDE8">'+esc(machine)+'</div>';
    if(latest.hours) html+='<div style="font-size:13px;font-weight:800;color:#E8580A">'+latest.hours+' hrs</div>';
    html+='</div>';
    mEntries.slice(0,3).forEach(function(e){
      var col=typeColors[e.type]||"#6E6B64";
      html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1C1C1C">';
      html+='<div>';
      html+='<span style="font-size:10px;color:'+col+';font-weight:700">'+esc(e.type)+'</span>';
      html+=' <span style="font-size:10px;color:#6E6B64">'+fmtDate(e.date+"T00:00:00")+'</span>';
      if(e.notes) html+='<div style="font-size:11px;color:#C8C4BE;margin-top:1px">'+esc(e.notes)+'</div>';
      html+='<div style="font-size:10px;color:#6E6B64">by '+esc(e.loggedBy||"crew")+'</div>';
      html+='</div>';
      if(e.hours) html+='<div style="font-size:12px;color:#E8580A;font-weight:700">'+e.hours+'h</div>';
      html+='</div>';
    });
    if(mEntries.length>3) html+='<div style="font-size:11px;color:#6E6B64;padding-top:4px">+'+( mEntries.length-3)+' more entries</div>';
    html+='</div>';
  });
  html+='</div>';
  return html;
}

// Migrate crew entries (ae_ents) into sessions on first load
function migrateCwEntries(){
  const crewEnts = load("ae_ents",[]);
  if(!crewEnts.length) return;
  let imported=0;
  crewEnts.forEach(function(e){
    // Check if already imported (by matching id)
    if(sessions.find(s=>s.id===e.id)) return;
    // Convert crew entry format to session format
    sessions.push({
      id: e.id,
      client: e.client||"",
      site: e.site||"",
      machine: e.machine||"Hitachi ZX55U",
      attachment: e.attachment||"General Bucket",
      hireType: "Wet Hire",
      operator: e.memberName||"",
      notes: e.notes||"",
      rate: 0, // rate unknown from crew side — manager can edit
      startTime: e.start,
      endTime: e.end,
      duration: e.dur||0,
      rawDuration: e.rawDur||0,
      lunchBreak: e.lunch||0,
      total: 0, // will need rate set manually
      status: "complete",
      invoiced: false,
      fromCrew: true // flag so manager knows rate needs setting
    });
    imported++;
  });
  if(imported>0){
    sessions.sort((a,b)=>new Date(b.startTime)-new Date(a.startTime));
    save("ae_sessions",sessions);
    console.log("Migrated "+imported+" crew entries into sessions");
  }
}

  const crewActive = load("ae_clocked",null);

var PIN="";
function pd(d){if(PIN.length>=4)return;PIN+=d;drawDots();if(PIN.length===4)setTimeout(checkPIN,150);}
function pbk(){PIN=PIN.slice(0,-1);drawDots();document.getElementById("pin-msg").textContent="";}
function pclr(){PIN="";drawDots();document.getElementById("pin-msg").textContent="";}
function drawDots(){for(let i=0;i<4;i++){const el=document.getElementById("d"+i);if(el)el.className="dot"+(i<PIN.length?" on":"");}}

function checkPIN(){
  const mgrPin = settings.managerPin||"0000";
  if(PIN===mgrPin){
    PIN=""; drawDots();
    currentUser={role:"manager",name:"Manager",id:"__mgr__"};
    openManagerView();
    return;
  }
  const member=crewMembers.find(m=>m.pin===PIN);
  if(member){
    PIN=""; drawDots();
    currentUser={role:"crew",...member};
    openCrewView(member);
  } else {
    document.getElementById("pin-msg").textContent="Wrong PIN — try again";
    const dots=document.getElementById("pin-dots");
    if(dots){dots.classList.add("pin-shake");setTimeout(()=>dots.classList.remove("pin-shake"),350);}

// ── Clock Tab ──────────────────────────────────────────────
function crewBuildClock(){
  var myE=sessions.filter(function(s){return s.operator===crewWHO.name;});
  var wkAgo=Date.now()-7*86400000;
  var todStr=new Date().toDateString();
  var totHrs=0,wkHrs=0,todHrs=0;
  myE.forEach(function(e){
    var dur=e.duration||0;
    totHrs+=dur;
    if(new Date(e.startTime).getTime()>=wkAgo) wkHrs+=dur;
    if(new Date(e.startTime).toDateString()===todStr) todHrs+=dur;
  });
  var isOn=crewClocked&&crewClocked.memberId===crewWHO.id;

  var html='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;margin-top:4px">'
    +'<div class="crew-stat"><div class="crew-stat-label">Today</div><div class="crew-stat-value" style="color:#22A05A">'+fmtHrs(todHrs)+'</div></div>'
    +'<div class="crew-stat"><div class="crew-stat-label">This Week</div><div class="crew-stat-value" style="color:#F5C518">'+fmtHrs(wkHrs)+'</div></div>'
    +'<div class="crew-stat"><div class="crew-stat-label">All Time</div><div class="crew-stat-value" style="color:#E8580A">'+fmtHrs(totHrs)+'</div></div>'
    +'</div>';

  html+='<div class="card" style="text-align:center;padding:24px 18px">';
  if(isOn){
    html+='<div style="font-size:13px;color:#22A05A;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">🟢 On the Clock</div>';
    html+='<div id="crew-big-timer" style="font-size:36px;font-weight:800;color:#22A05A;font-variant-numeric:tabular-nums;margin-bottom:4px">00:00:00</div>';
    html+='<div style="font-size:12px;color:#6E6B64;margin-bottom:16px">Started '+fmtTime(crewClocked.start)+'</div>';
    html+='<div style="font-size:13px;color:#C8C4BE;margin-bottom:16px">'+esc(crewClocked.machine||"")+(crewClocked.client?" · "+esc(crewClocked.client):"")+'</div>';
    html+='<button class="btn btn-danger" style="width:100%;padding:14px;font-size:15px" onclick="showClockOff()">⏹ Clock Off</button>';
  } else {
    html+='<div style="font-size:13px;color:#6E6B64;margin-bottom:20px">You are not clocked in</div>';
    html+='<button class="btn btn-success" style="width:100%;padding:16px;font-size:16px;border-radius:12px" onclick="showCrewClockIn()">▶ Clock In</button>';
  }
  html+='</div>';

  if(myE.length>0){
    html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    html+='<div style="font-size:13px;font-weight:800;color:#F0EDE8">Recent Shifts</div>';
    html+='<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="crewDoShareAll()" style="color:#22A05A;border-color:#1A6B3C40 !important">📤 Share</button>';
    html+='<button class="btn btn-ghost btn-sm" onclick="crewNav(1)">View All</button></div></div>';
    myE.slice(0,3).forEach(function(e){
      html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #282828">';
      html+='<div><div style="font-size:12px;color:#F0EDE8;font-weight:700">'+esc(e.machine||"")+'</div>';
      html+='<div style="font-size:11px;color:#6E6B64;margin-top:2px">'+fmtDate(e.startTime)+(e.client?" · "+esc(e.client):"")+'</div></div>';
      html+='<div><div style="font-size:14px;font-weight:800;color:#22A05A">'+fmtHrs(e.duration)+'</div>';
      if(e.lunchBreak>0) html+='<div style="font-size:10px;color:#F5C518">☕ '+e.lunchBreak+'min</div>';
      if(e.fromCrew) html+='<div style="font-size:10px;color:#6E6B64">Rate TBC</div>';
      html+='</div></div>';
    });
    html+='</div>';
  }
  return html;
}

var _crewStopEnd, _crewStopRaw, _crewStopLunch=0;

function ccoSelLunch(m){
  _crewStopLunch=m;
  [0,15,20,30,45,60].forEach(function(x){var b=document.getElementById("cco-lb"+x);if(b)b.className="lb"+(x===m?" on":"");});
  ccoUpdPreview();
}
function ccoSelLunchOther(v){
  _crewStopLunch=v||0;
  [0,15,20,30,45,60].forEach(function(x){var b=document.getElementById("cco-lb"+x);if(b)b.className="lb";});
  ccoUpdPreview();
}
function ccoUpdPreview(){
  var bill=Math.max(0,_crewStopRaw-(_crewStopLunch/60));
  var lr=document.getElementById("cco-lrow"),lv=document.getElementById("cco-lval"),bh=document.getElementById("cco-bill");
  if(lr) lr.style.display=_crewStopLunch>0?"flex":"none";
  if(lv) lv.textContent="− "+_crewStopLunch+"min";
  if(bh) bh.textContent=fmtHrs(bill);
}
function doCrewClockOff(){
  if(!crewClocked) return;
  var bill=Math.max(0,_crewStopRaw-(_crewStopLunch/60));
  // Save engine hours if entered
  var engHours=gv("cco-eng-hours");
  if(engHours){
    var mhData=getMachineHours();
    mhData.unshift({
      id:uid(), machine:crewClocked.machine||"Hitachi ZX55U",
      type:"Hours Logged", date:new Date().toISOString().split("T")[0],
      hours:parseFloat(engHours), notes:"End of shift",
      loggedBy:crewWHO?crewWHO.name:"",
      timestamp:new Date().toISOString()
    });
    saveMachineHours(mhData);
  }
  // Save as a session in the main sessions array (boss can see it and set rate)
  var entry={
    id:uid(), client:crewClocked.client, site:crewClocked.site,
    machine:crewClocked.machine, attachment:crewClocked.attachment||"General Bucket",
    hireType:"Wet Hire", operator:crewClocked.memberName||"",
    notes:crewClocked.notes||"",
    rate:0,
    startTime:crewClocked.start, endTime:_crewStopEnd,
    duration:bill, rawDuration:_crewStopRaw, lunchBreak:_crewStopLunch,
    total:0, status:"complete", invoiced:false, fromCrew:true,
    engineHours:engHours?parseFloat(engHours):null
  };
  sessions.unshift(entry);
  sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});
  save("ae_sessions",sessions);
  crewClocked=null; crewSaveAll();
  hideCrewBanner(); stopCrewTimer(); closeModal();
  crewDrawTab();
  toast("Saved — "+fmtHrs(bill)+(_crewStopLunch>0?" (excl. "+_crewStopLunch+"min lunch)":""));
}

// ── Crew History Tab ──────────────────────────────────────
function crewBuildHistory(){
  var myE=sessions.filter(function(s){return s.operator===crewWHO.name;});
  myE.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});
  if(!myE.length) return'<div class="card"><div class="empty"><div class="empty-icon">📋</div><div>No entries yet. Clock in to start logging.</div></div></div>';

  var totAll=0; myE.forEach(function(e){totAll+=e.duration||0;});
  var html='<div class="card" style="border-color:#1A6B3C40;margin-bottom:4px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center">';
  html+='<div><div style="font-size:11px;color:#6E6B64;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Total All Time</div>';
  html+='<div style="font-size:20px;font-weight:800;color:#22A05A">'+fmtHrs(totAll)+'</div></div>';
  html+='<button class="btn btn-success btn-sm" onclick="crewDoShareAll()">📤 Share All Hours</button>';
  html+='</div></div>';

  // Group by week
  var wks={};
  myE.forEach(function(e){
    var d=new Date(e.startTime);
    var mon=new Date(d); mon.setDate(d.getDate()-(d.getDay()||7)+1);
    var key=mon.toDateString();
    if(!wks[key]) wks[key]={label:"Week of "+mon.toLocaleDateString("en-AU",{day:"2-digit",month:"short"}),list:[],tot:0};
    wks[key].list.push(e); wks[key].tot+=e.duration||0;
  });

  Object.values(wks).forEach(function(wk){
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px">';
    html+='<div style="font-size:11px;color:#6E6B64;font-weight:700;letter-spacing:1px;text-transform:uppercase">'+wk.label+'</div>';
    html+='<div style="font-size:13px;font-weight:800;color:#22A05A">'+fmtHrs(wk.tot)+'</div></div>';
    wk.list.forEach(function(e){
      html+='<div class="card" style="margin-bottom:8px">';
      html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
      html+='<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#F0EDE8">'+esc(e.machine||"")+(e.attachment&&e.attachment!=="General Bucket"?" · "+esc(e.attachment):"")+'</div>';
      if(e.client) html+='<div style="font-size:12px;color:#C8C4BE;margin-top:2px">'+esc(e.client)+(e.site?" · "+esc(e.site):"")+'</div>';
      html+='<div style="font-size:11px;color:#6E6B64;margin-top:3px">'+fmtDate(e.startTime)+" · "+fmtTime(e.startTime)+" → "+fmtTime(e.endTime)+'</div>';
      if(e.notes) html+='<div style="font-size:11px;color:#6E6B64;margin-top:3px;font-style:italic">'+esc(e.notes)+'</div>';
      html+='</div><div style="text-align:right;flex-shrink:0">';
      html+='<div style="font-size:15px;font-weight:800;color:#22A05A">'+fmtHrs(e.duration)+'</div>';
      if(e.lunchBreak>0) html+='<div style="font-size:10px;color:#F5C518">☕ '+e.lunchBreak+'min</div>';
      html+='</div></div></div>';
    });
  });
  return html;
}

// ── Crew Manual Entry ─────────────────────────────────────
function crewBuildManual(){
  var today=new Date().toISOString().split("T")[0];
  var attOpts=ATTACHMENTS.map(function(a){return '<option>'+a+'</option>';}).join("");
  var machOpts=MACHINES.map(function(m){return '<option>'+m+'</option>';}).join("");
  var lbBtns=[0,15,20,30,45,60].map(function(m){
    return '<button class="lb'+(m===0?" on":"")+'" id="cme-lb'+m+'" onclick="cmeSelLunch('+m+')">'+
      (m===0?"No Break":m+"min")+'</button>';
  }).join("");
  return '<div class="card">'+
    '<div style="font-size:13px;font-weight:800;color:#F0EDE8;margin-bottom:14px">✎ Log Manual Entry</div>'+
    '<div class="field"><label>Client</label>'+smartInput("cme-client","clients","e.g. South Coast Sand & Civil")+'</div>'+
    '<div class="field"><label>Site</label>'+smartInput("cme-site","sites","e.g. Goolwa North Stage 1")+'</div>'+
    '<div class="field"><label>Date *</label><input id="cme-date" type="date" value="'+today+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div>'+
    '<div style="display:flex;gap:10px"><div class="field" style="flex:1"><label>Start Time *</label><input id="cme-start" type="time" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div>'+
    '<div class="field" style="flex:1"><label>End Time *</label><input id="cme-end" type="time" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div></div>'+
    '<div class="field"><label>Machine</label><select id="cme-machine" onchange="cmeMachChange()" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%">'+machOpts+'</select></div>'+
    '<div class="field" id="cme-att-wrap"><label>Attachment</label><select id="cme-attach" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%">'+attOpts+'</select></div>'+
    '<div style="margin-bottom:12px"><div style="font-size:10px;color:#6E6B64;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px">Lunch Break</div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">'+lbBtns+'</div>'+
    '<input type="hidden" id="cme-lunch-val" value="0"/></div>'+
    '<div class="field"><label>Notes (optional)</label>'+smartInput("cme-notes","notes","Any notes")+'</div>'+
    '<button class="btn btn-success" style="width:100%;padding:13px;font-size:15px" onclick="doCrewSaveManual()">Save Entry</button>'+
    '</div>';
}
var CME_LUNCH=0;
function cmeSelLunch(m){
  CME_LUNCH=m;
  var lv=document.getElementById("cme-lunch-val"); if(lv) lv.value=m;
  [0,15,20,30,45,60].forEach(function(x){var b=document.getElementById("cme-lb"+x);if(b)b.className="lb"+(x===m?" on":"");});
}
function cmeMachChange(){
  var m=document.getElementById("cme-machine");
  var f=document.getElementById("cme-att-wrap");
  if(m&&f) f.style.display=(m.value==="Hino 700")?"none":"block";
}
function doCrewSaveManual(){
  var client=gv("cme-client")||"";
  var site=gv("cme-site")||"";
  var date=gv("cme-date")||"";
  var startT=gv("cme-start")||"";
  var endT=gv("cme-end")||"";
  if(!date||!startT||!endT){toast("Please enter date, start and end time","error");return;}
  var sISO=new Date(date+"T"+startT).toISOString();
  var eISO=new Date(date+"T"+endT).toISOString();
  if(new Date(eISO)<=new Date(sISO)){toast("End must be after start","error");return;}
  var raw=(new Date(eISO)-new Date(sISO))/3600000;
  var lunch=parseInt(gv("cme-lunch-val"))||0;
  var dur=Math.max(0,raw-(lunch/60));
  var machine=gv("cme-machine")||"Hitachi ZX55U";
  var attach=machine!=="Hino 700"?(gv("cme-attach")||"General Bucket"):"";
  var notes=gv("cme-notes")||"";
  addHistory("clients",client.trim()); addHistory("sites",site.trim());
  sessions.unshift({id:uid(),client:client.trim(),site:site.trim(),machine:machine,
    attachment:attach,hireType:"Wet Hire",operator:crewWHO.name,notes:notes.trim(),
    rate:0,startTime:sISO,endTime:eISO,duration:dur,rawDuration:raw,lunchBreak:lunch,
    total:0,status:"complete",invoiced:false,fromCrew:true});
  sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});
  save("ae_sessions",sessions);
  crewNav(1);
  toast("Entry saved — "+fmtHrs(dur));
}

// ── Crew Share ────────────────────────────────────────────
function crewBuildShareText(name,ents){
  var tot=0; ents.forEach(function(e){tot+=e.duration||0;});
  var lines=["━━━━━━━━━━━━━━━━━━━━━━━","ANGEL EARTHWORKS & CIVIL",
    "Timesheet — "+name, new Date().toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}),
    "━━━━━━━━━━━━━━━━━━━━━━━",""];
  ents.forEach(function(e,i){
    lines.push((i+1)+". "+fmtDate(e.startTime)+" "+fmtTime(e.startTime)+"–"+fmtTime(e.endTime));
    lines.push("   "+(e.machine||"")+(e.client?" | "+e.client:"")+(e.site?" | "+e.site:""));
    lines.push("   Hours: "+fmtHrs(e.duration)+(e.lunchBreak>0?" (excl. "+e.lunchBreak+"min lunch)":""));
    if(e.engineHours) lines.push("   Engine Hrs: "+e.engineHours+"h");
    lines.push("");
  });
  lines.push("━━━━━━━━━━━━━━━━━━━━━━━");
  lines.push("TOTAL: "+fmtHrs(tot));
  lines.push("━━━━━━━━━━━━━━━━━━━━━━━");
  return lines.join("\n");
}
function crewDoShare(text,title){
  if(navigator.share){navigator.share({title:title,text:text}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){toast("Copied to clipboard");}).catch(function(){crewShowShareFallback(text);});}
  else{crewShowShareFallback(text);}
}
function crewDoShareAll(){
  var myE=sessions.filter(function(s){return s.operator===crewWHO.name;});
  if(!myE.length){toast("No entries to share","error");return;}
  crewDoShare(crewBuildShareText(crewWHO.name,myE),"Timesheet — "+crewWHO.name);
}
function crewShowShareFallback(text){
  openModal("📋 Copy Timesheet");
  document.getElementById("modal-body").innerHTML=
    '<div style="font-size:12px;color:#6E6B64;margin-bottom:10px">Press and hold to select all, then copy.</div>'+
    '<textarea readonly onclick="this.select()" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:12px;width:100%;height:260px;font-size:11px;line-height:1.6;font-family:monospace;resize:none">'+
    text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</textarea>'+
    '<button class="btn btn-success" style="width:100%;margin-top:12px" onclick="closeModal()">Done</button>';
}

// ── Crew Manage (in boss view) — update crew member PINs ─
function addCrewMember(name,role,pin){
  if(crewMembers.find(function(m){return m.pin===pin;})){toast("PIN in use","error");return false;}
  crewMembers.push({id:uid(),name:name,role:role||"Operator",pin:pin});
  save("ae_pins",crewMembers);
  return true;
}
function updateCrewPin(id,newPin){
  if(crewMembers.find(function(m){return m.pin===newPin&&m.id!==id;})){toast("PIN in use","error");return false;}
  crewMembers=crewMembers.map(function(m){return m.id===id?{...m,pin:newPin}:m;});
  save("ae_pins",crewMembers);
  return true;
}

// ── Machine Hours (Crew) ──────────────────────────────────
// Stored in ae_mhours: [{id, machine, date, hours, notes, type, loggedBy, timestamp}]
// Types: "Service Due", "Service Done", "Hours Logged", "Fault Noted"

function getMachineHours(){
  return load("ae_mhours",[]);
}
function saveMachineHours(data){
  save("ae_mhours",data);
}

function crewBuildMachineHours(){
  var entries=getMachineHours();
  entries.sort(function(a,b){return new Date(b.timestamp)-new Date(a.timestamp);});

  var machOpts=MACHINES.map(function(m){return '<option>'+m+'</option>';}).join("");
  var typeOpts=["Hours Logged","Service Done","Service Due","Fault Noted","Other"].map(function(t){
    return '<option>'+t+'</option>';
  }).join("");

  var html='<div class="card" style="margin-bottom:12px">';
  html+='<div style="font-size:13px;font-weight:800;color:#F0EDE8;margin-bottom:14px">🔧 Log Machine Hours</div>';
  html+='<div class="field"><label>Machine</label><select id="mh-machine" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%;font-family:inherit">'+machOpts+'</select></div>';
  html+='<div class="field"><label>Entry Type</label><select id="mh-type" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%;font-family:inherit">'+typeOpts+'</select></div>';
  html+='<div style="display:flex;gap:10px"><div class="field" style="flex:1"><label>Date</label><input id="mh-date" type="date" value="'+new Date().toISOString().split("T")[0]+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%;font-family:inherit"/></div>';
  html+='<div class="field" style="flex:1"><label>Engine Hours</label><input id="mh-hours" type="number" min="0" step="0.1" placeholder="e.g. 1250" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%;font-family:inherit"/></div></div>';
  html+='<div class="field"><label>Notes</label><input id="mh-notes" placeholder="e.g. 1000hr service completed, oil changed" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%;font-family:inherit"/></div>';
  html+='<button class="btn btn-success" style="width:100%;padding:13px;font-size:15px" onclick="doSaveMachineHours()">💾 Save Entry</button>';
  html+='</div>';

  // Group by machine
  var byMachine={};
  entries.forEach(function(e){
    if(!byMachine[e.machine]) byMachine[e.machine]=[];
    byMachine[e.machine].push(e);
  });

  if(entries.length===0){
    html+='<div class="card"><div class="empty"><div class="empty-icon">🔧</div><div>No machine hour entries yet.<br/>Log hours after each shift.</div></div></div>';
    return html;
  }

  Object.keys(byMachine).forEach(function(machine){
    var mEntries=byMachine[machine];
    var latest=mEntries[0];
    html+='<div class="card" style="margin-bottom:8px">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    html+='<div style="font-size:13px;font-weight:800;color:#F0EDE8">'+esc(machine)+'</div>';
    if(latest.hours) html+='<div style="font-size:12px;color:#E8580A;font-weight:700">Latest: '+latest.hours+'h</div>';
    html+='</div>';
    mEntries.slice(0,5).forEach(function(e){
      var typeColors={"Service Done":"#22A05A","Service Due":"#F5C518","Fault Noted":"#D93B3B","Hours Logged":"#E8580A","Other":"#6E6B64"};
      var col=typeColors[e.type]||"#6E6B64";
      html+='<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #1C1C1C">';
      html+='<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">';
      html+='<span style="font-size:10px;font-weight:700;color:'+col+';background:'+col+'22;padding:2px 8px;border-radius:10px">'+esc(e.type)+'</span>';
      html+='</div>';
      html+='<div style="font-size:11px;color:#6E6B64">'+fmtDate(e.date+'T00:00:00')+'</div>';
      if(e.notes) html+='<div style="font-size:11px;color:#C8C4BE;margin-top:2px">'+esc(e.notes)+'</div>';
      html+='<div style="font-size:10px;color:#6E6B64;margin-top:1px">Logged by: '+esc(e.loggedBy||"")+'</div>';
      html+='</div>';
      if(e.hours) html+='<div style="font-size:14px;font-weight:800;color:#E8580A">'+e.hours+'h</div>';
      html+='</div>';
    });
    if(mEntries.length>5){
      html+='<div style="font-size:11px;color:#6E6B64;text-align:center;padding:8px 0">+'+( mEntries.length-5)+' more entries</div>';
    }
    html+='</div>';
  });

  return html;
}

function doSaveMachineHours(){
  var machine=gv("mh-machine")||"Hitachi ZX55U";
  var type=gv("mh-type")||"Hours Logged";
  var date=gv("mh-date")||new Date().toISOString().split("T")[0];
  var hours=gv("mh-hours");
  var notes=gvt("mh-notes");
  if(!hours&&!notes){toast("Please enter hours or notes","error");return;}
  var data=getMachineHours();
  data.unshift({
    id:uid(), machine:machine, type:type, date:date,
    hours:hours?parseFloat(hours):null, notes:notes,
    loggedBy:crewWHO?crewWHO.name:"",
    timestamp:new Date().toISOString()
  });
  saveMachineHours(data);
  crewNav(3);
  toast("Saved ✅");
}
